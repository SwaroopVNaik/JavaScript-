<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./EventBasics.js" type="text/JavaScript"></script>
    <title>HTML EVENTS</title>
</head>
<body style="background-color: #414141; color : Aliceblue">
    <h2>Amazing image</h2>
    <div >
        <ul id="images">
            <li><img width="200px" id="photoshop" src="https://images.pexels.com/photos/3561339/pexels-photo-3561339.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt="photoshop"></li>
            <li><img width="200px" id="japan" src="https://images.pexels.com/photos/3532553/pexels-photo-3532553.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt=""></li>
            <li><img width="200px" id="river" src="https://images.pexels.com/photos/3532551/pexels-photo-3532551.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt=""></li>
            <li><img width="200px" id="owl" src="https://images.pexels.com/photos/3532552/pexels-photo-3532552.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt="" ></li>
            <li><img width="200px" id="prayer" src="https://images.pexels.com/photos/2522671/pexels-photo-2522671.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt=""></li>
            <li><a style="color: aliceblue;" href="https://google.com" id="google">Google</a></li>
        </ul>
   </div>
</body>
<script>

    //AttachEVent  => this was used at the start of the Internet Explorer
    //JQuery - onevent

    // few types of EVENTS in JS 
    /*
    type, timestamp, defaultPrevented
    Target, toElement, srcElement, currentTarget, 
    clientX, clientY, screenX, screenY
    altkey, ctrlkey, shiftkey, keyCode
     */

    //Approach => 1 ==> adding events inside HTML Tags

    // Approach => 2 
    /* document.getElementById('owl').onclick = function(){
        alert("Owl Clicked !")
    } */

    // Approach => 3 (Best Approach)
    document.getElementById('owl').addEventListener('click', function(){
        alert("Owl Clicked !!!")
    }, false)

    // Event Object

    document.getElementById('river').addEventListener('click', function(event){
        console.log(event)
    }, false) // false (Event Propagation) is default in Event Object

    // (Event Propagation) has two contexts =>>>
    // 1) Event Bubbling (false) ==>  Moslty Used In Market ==> Prints buttom  to up
    // Exmaple ==> first owl printed || second "clicked inside UL"
    // 2) Event capturing (true) ==> few scenarios Used, Event Capturing goes top to bottom

    // This will be printed when we click inside images ie UL
    document.getElementById('images').addEventListener('click', function(event){
        console.log("Clicked Inside the UL")
    }, false) 

    // This will be printed when clicked specifically inside owl
    document.getElementById('river').addEventListener('click', function(event){
        console.log('River Clicked')
        event.stopPropagation // the event becomes bubble and it won't go to above event
    }, false) 

    document.getElementById('google').addEventListener('click', function(event){
        event.preventDefault(); // default event gets prevented and our custom event will function
        event.stopPropagation(); // Stopping propagation
        console.log("google Clicked");
    }, false)

    


</script>
</html>
